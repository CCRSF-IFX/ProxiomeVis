name: mkdocs

on:
  push:
    branches:
      - main
    paths:
      - "mkdocs.yaml"
      - "pixi.toml"
      - "pixi.lock"
      - "docs/**"
      - "notebooks/**"
      - "figures/**"
      - "tables/**"
      - ".github/workflows/ci_mkdocs.yaml"
  pull_request:
    paths:
      - "mkdocs.yaml"
      - "pixi.toml"
      - "pixi.lock"
      - "docs/**"
      - "notebooks/**"
      - "figures/**"
      - "tables/**"
      - ".github/workflows/ci_mkdocs.yaml"

permissions:
  contents: write

concurrency:
  group: mkdocs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          pixi-version: v0.66.0
          cache: true
      - name: Build documentation
        run: pixi run build-docs
      - name: Deploy documentation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pixi run deploy-docs
